[package]
name = "rainlang-interface"
version = "0.2.0"

[profile.default]

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"

# Try to make sure the optimizer doesn't touch the output in a way that can break
# source maps for debugging.
# via_ir = false
# optimizer = false
# optimizer_runs = 0
# optimizer_steps = 0

# These settings should be used for snapshots
optimizer = true
optimizer_runs = 1000000

evm_version = "cancun"

bytecode_hash = "none"
cbor_metadata = false

libs = ["dependencies"]

[fuzz]
runs = 2048

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"rain-lib-hash" = "0.1.0"
"rain-lib-typecast" = "0.1.0"
"rain-math-binary" = "0.1.1"
"rain-sol-codegen" = "0.1.0"
"rain-solmem" = "0.1.3"

[soldeer]
recursive_deps = false
